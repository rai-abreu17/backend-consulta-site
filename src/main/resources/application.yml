spring:
  application:
    name: terreiro-rei-sebastiao

  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL:}}
    username: ${DB_USER:${SPRING_DATASOURCE_USERNAME:}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}

  data:
    redis:
      url: ${REDIS_URL:${SPRING_DATA_REDIS_URL:}}

  # ── JPA / Hibernate ──────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # ── Flyway ───────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ── Jackson ──────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

# ── JWT ────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:15m}
  refresh-ttl-days: 30

# ── Mercado Pago ───────────────────────────────────────
mp:
  access-token: ${MP_ACCESS_TOKEN}
  webhook:
    secret: ${MP_WEBHOOK_SECRET}

# ── PII (LGPD) ────────────────────────────────────────
pii:
  key: ${PII_SECRET_KEY:${PII_KEY}}
  hash-salt: ${PII_HASH_SALT}

# ── CORS ──────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ── Server ────────────────────────────────────────────
server:
  ssl:
    enabled: false
  servlet:
    context-path: /

# ── Actuator ──────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

notification:
  email:
    from: ${MAIL_FROM:no-reply@terreiro.local}
  terreiro:
    endereco: ${TERREIRO_ENDERECO:Morada do Terreiro de Rei Sebastião a configurar}
    maps-url: ${TERREIRO_MAPS_URL:https://maps.google.com/?q=Terreiro+Rei+Sebastiao}
    link-online: ${TERREIRO_LINK_ONLINE:https://meet.google.com/terreiro-rei-sebastiao}
